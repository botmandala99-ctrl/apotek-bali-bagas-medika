<!DOCTYPE html>
<html lang="id">
<head>

<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>APOTEK BALI BAGAS MEDIKA</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}
body{background:#f5f5f5}
.h{background:#1e40af;color:#fff;padding:14px;text-align:center;font-size:16px;font-weight:bold}
.t{display:flex;background:#fff;border-bottom:1px solid #e5e7eb;position:sticky;top:0}
.tb{flex:1;padding:12px;border:none;cursor:pointer;font-size:14px;font-weight:600;border-bottom:2px solid transparent;color:#6b7280}
.tb.on{color:#1e40af;border-bottom-color:#1e40af}
.c{padding:10px;max-width:800px;margin:0 auto;display:none}
.c.aktif{display:block}
.g{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.cd{background:#fff;border-radius:8px;padding:12px}
.l{font-size:10px;color:#9ca3af;text-transform:uppercase}
.v{font-size:22px;font-weight:bold;margin-top:2px}
.f{display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap}
.fb{padding:8px 14px;border-radius:20px;border:1px solid #d1d5db;cursor:pointer;font-size:12px;font-weight:500;color:#374151}
.fb.on{background:#1e40af;color:#fff;border-color:#1e40af}
.bc{display:flex;gap:3px;align-items:flex-end;height:80px;padding:6px 4px;background:#fff;border-radius:8px;margin-bottom:10px}
.bw{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;height:100%;justify-content:flex-end}
.bw .i{font-size:8px;color:#6b7280}
.bw .b{width:65%;max-width:20px;border-radius:2px 2px 0 0;min-height:2px}
.bw .lb{font-size:10px;color:#374151;font-weight:bold;margin-top:1px}
.tw{background:#fff;border-radius:8px;overflow:hidden}
.tl{padding:10px 12px;font-size:14px;font-weight:bold;border-bottom:1px solid #eee}
.s{overflow:auto;max-height:400px}
table{width:100%;font-size:11px;border-collapse:collapse}
th{padding:4px;font-size:10px;color:#6b7280;text-align:right;background:#f9fafb;position:sticky;top:0;border:1px solid #d1d5db}
td{padding:3px;border:1px solid #e5e7eb;text-align:right;font-size:11px}
td.l{text-align:left}
.n{background:#fafafa}
.bg{display:inline-block;padding:1px 6px;border-radius:999px;font-size:7px;font-weight:bold}
.bg1{background:#dcfce7;color:#16a34a}
.bg2{background:#fee2e2;color:#dc2626}
.sel{padding:8px 12px;border:1px solid #d1d5db;border-radius:5px;font-size:13px}
.bp{padding:8px 14px;border:none;border-radius:5px;background:#1e40af;color:#fff;font-size:12px;font-weight:bold;cursor:pointer}
@media print {
  @page { margin: 5mm; size: portrait; }
  body { margin: 0; padding: 0; }
  .t, .f, .sel, .bp { display: none !important; }
  #c1 { display: block !important; }
  #pc, #pch, #pf { display: none !important; }
  .h { background:#1e40af; color:#fff; padding:6px; text-align:center; font-size:11px; font-weight:bold; -webkit-print-color-adjust: exactly; print-color-adjust: exact; }
  .c { max-width: 100%; padding: 0; }
  .tw { border-radius: 0; box-shadow: none; }
  table { font-size: 7px; }
  td, th { padding: 2px 3px; }
  #c1 .tl { font-size: 10px; padding: 4px 6px; }
}
</style>

<body>
<div class="h">APOTEK BALI BAGAS MEDIKA</div>
<div class="t">
<button class="tb on" onclick="gt(0)">📊 PENJUALAN</button>
<button class="tb" onclick="gt(1)">📋 LPH</button>
<button class="tb" onclick="gt(2)">💰 FAKTUR</button>
</div>
<div class="c" id="c0"><div id="pj_content">Loading...</div></div>
<div class="c" id="c1"><div id="lph_content">Loading...</div></div>
<div class="c" id="c2"><div id="ft_content">Loading...</div></div>
<script>
var data_js = {}; // data loaded via fetch

var BN = ["Jan","Feb","Mar","Apr","Mei","Jun","Jul","Agu","Sep","Okt"];
function fm(n){var v=Math.round(parseFloat(n)||0);return "Rp "+v.toLocaleString("id-ID")}
function gt(i){
  var a=document.querySelectorAll(".c");
  for(var j=0;j<a.length;j++)a[j].className="c";
  a[i].className="c aktif";
  var t=document.querySelectorAll(".tb");
  for(var j=0;j<t.length;j++)t[j].className="tb";
  t[i].className="tb on";
}

function rP(){
  var P = D.P || [];
  var BM = D.B || {};
  var FT = D.F || [];
  var TO = D.TO || 0;
  var TK = D.TK || 0;
  
  var blm = 0;
  for(var i=0;i<FT.length;i++) if(!FT[i].nb) blm++;
  
  var h = "";
  h += '<div class="f" id="pf">';
  h += '<button class="fb on" onclick="fl(0)">Semua</button>';
  for(var i=0;i<BN.length;i++) h += '<button class="fb" onclick="fl('+(i+1)+')">'+BN[i]+'</button>';
  h += '</div>';
  
  h += '<div class="g" id="pc">';
  h += '<div class="cd"><div class="l">Omzet 2026</div><div class="v" style="color:#d97706">'+fm(TO)+'</div></div>';
  h += '<div class="cd"><div class="l">Kunjungan</div><div class="v" style="color:#2563eb">'+TK.toLocaleString("id-ID")+'</div></div>';
  h += '<div class="cd"><div class="l">Rata/Hari</div><div class="v" style="color:#059669">'+fm(parseInt(TO/(P.length||1)))+'</div></div>';
  h += '<div class="cd"><div class="l">Faktur Belum</div><div class="v" style="color:#dc2626">'+blm+'</div></div>';
  h += '</div>';
  
  var mo = 0;
  for(var i=0;i<BN.length;i++) if((BM[BN[i]]||0)>mo) mo=BM[BN[i]];
  var cc = ["#3b82f6","#8b5cf6","#ec4899","#f97316","#10b981","#14b8a6","#f59e0b"];
  h += '<div style="text-align:right;font-size:8px;color:#dc2626;margin-bottom:2px">Target: Rp 200jt/bulan</div>';
  h += '<div class="bc" id="pch" style="display:flex;align-items:center;justify-content:center;min-height:80px"><span style="font-size:11px;color:#9ca3af">Memuat diagram...</span>';
  for(var i=0;i<BN.length;i++){
    var v = BM[BN[i]]||0;
    var pct = mo>0?(v/mo)*65:0;
    h += '<div class="bw"><div class="i">'+fm(v)+'</div><div class="b" style="height:'+Math.max(pct,3)+'px;background:'+cc[i]+'"></div><div class="lb">'+BN[i]+'</div></div>';
  }
  h += '</div>';
  
  h += '<div class="tw"><div class="tl">Penjualan Harian (<span id="pcnt">'+P.length+'</span> baris)</div>';
  h += '<div class="s"><table><tr><th style="text-align:left">Tgl</th><th style="border-right:2px solid #d1d5db">Cash Pagi</th><th style="border-right:2px solid #d1d5db">Mandiri Pagi</th><th style="border-right:2px solid #d1d5db">Qris Pagi</th><th style="border-right:2px solid #d1d5db">Jumlah Pagi</th><th style="border-left:2px solid #d1d5db">Cash Sore</th><th>Mandiri Sore</th><th>Qris Sore</th><th>Jumlah Sore</th><th>Total</th><th>K</th></tr><tbody id="pb">';
  
  for(var i=P.length-1;i>=0;i--){
    var r = P[i];
    h += '<tr'+(i%2==0?' class="n"':'')+'><td class="l">'+r.t+'</td>';
    h += '<td>'+fm(r.c1)+'</td><td>'+fm(r.c2)+'</td><td>'+fm(r.c3)+'</td><td>'+fm(r.c4)+'</td>';
    h += '<td>'+fm(r.c5)+'</td><td>'+fm(r.c6)+'</td><td>'+fm(r.c7)+'</td><td>'+fm(r.c8)+'</td>';
    h += '<td style="font-weight:bold">'+fm(r.tt)+'</td><td>'+r.kj+'</td></tr>';
  }
  h += '</tbody></table></div></div>';
  
  document.getElementById("pj_content").innerHTML = h;
  window.P_DATA = P;
  window.BM_DATA = BM;
  window.BI = 0;
}

var BI = 0;
function fl(i){
  BI = i;
  var btns = document.getElementById("pf").querySelectorAll(".fb");
  for(var j=0;j<btns.length;j++) btns[j].className="fb";
  btns[i].className="fb on";
  var f = BI>0 ? P_DATA.filter(function(x){return x.b==BN[BI-1]}) : P_DATA;
  var mt=0,mk=0;
  for(var i=0;i<f.length;i++){mt+=f[i].tt;mk+=f[i].kj}
  
  var FT2 = D.F || [];
  var blm2 = 0;
  for(var i=0;i<FT2.length;i++) if(!FT2[i].nb) blm2++;
  
  document.getElementById("pc").innerHTML = 
    '<div class="cd"><div class="l">Omzet'+(BI>0?" "+BN[BI-1]:" 2026")+'</div><div class="v" style="color:#d97706">'+fm(mt)+'</div></div>'+
    '<div class="cd"><div class="l">Kunjungan</div><div class="v" style="color:#2563eb">'+mk.toLocaleString("id-ID")+'</div></div>'+
    '<div class="cd"><div class="l">Rata/Hari</div><div class="v" style="color:#059669">'+fm(parseInt(mt/(f.length||1)))+'</div></div>'+
    '<div class="cd"><div class="l">Faktur Belum</div><div class="v" style="color:#dc2626">'+blm2+'</div></div>';
  
  var mo=0;
  for(var i=0;i<BN.length;i++) if((BM_DATA[BN[i]]||0)>mo) mo=BM_DATA[BN[i]];
  var cc=["#3b82f6","#8b5cf6","#ec4899","#f97316","#10b981","#14b8a6","#f59e0b"];
  var ch="<div style='text-align:right;font-size:8px;color:#dc2626;margin-bottom:2px'>Target: Rp 200jt/bulan</div>";
  for(var i=0;i<BN.length;i++){
    var v=BM_DATA[BN[i]]||0;
    var pct=mo>0?(v/mo)*65:0;
    ch+='<div class="bw"><div class="i">'+fm(v)+'</div><div class="b" style="height:'+Math.max(pct,3)+'px;background:'+(BI==i+1?"#d97706":cc[i])+'"></div><div class="lb">'+BN[i]+'</div></div>';
  }
  document.getElementById("pch").innerHTML = ch;
  
  var bh="";
  for(var i=f.length-1;i>=0;i--){
    var r=f[i];
    bh+='<tr'+(i%2==0?' class="n"':'')+'><td class="l">'+r.t+'</td><td>'+fm(r.c1)+'</td><td>'+fm(r.c2)+'</td><td>'+fm(r.c3)+'</td><td>'+fm(r.c4)+'</td><td style="border-left:2px solid #d1d5db">'+fm(r.c5)+'</td><td>'+fm(r.c6)+'</td><td>'+fm(r.c7)+'</td><td>'+fm(r.c8)+'</td><td style="font-weight:bold">'+fm(r.tt)+'</td><td>'+r.kj+'</td></tr>';
  }
  document.getElementById("pb").innerHTML = bh;
  document.getElementById("pcnt").innerHTML = f.length;
}

function rL(){
  var L = D.L || {};
  var LD = D.D || [];
  if(!LD.length){document.getElementById("lph_content").innerHTML='<p style="padding:40px;text-align:center;color:#999">Tidak ada data LPH</p>';return}
  
  var last = LD[LD.length-1];
  var h = '<div style="margin-bottom:8px;display:flex;gap:6px;align-items:center;flex-wrap:wrap">';
  h += '<select class="sel" id="ls" onchange="rl()">';
  for(var i=0;i<LD.length;i++) h+='<option value="'+LD[i]+'"'+(LD[i]==last?" selected":"")+'>'+LD[i]+'</option>';
  h += '</select><button class="bp" onclick="window.print()">Cetak</button></div>';
  h += '<div class="tw" id="ltw">';
  
  var d = L[last];
  h += '<div style="text-align:center;padding:8px;border-bottom:1px solid #eee">';
  h += '<div style="font-size:12px;font-weight:bold">LAPORAN PENJUALAN HARIAN (LPH) - APOTEK BALI BAGAS MEDIKA</div>';
  h += '<div style="font-size:10px;color:#374151;font-weight:600">'+last+'</div></div>';
  h += '<table style="border-collapse:collapse;width:100%"><tr><th style="text-align:left;border:1px solid #d1d5db;padding:6px;background:#f9fafb">URAIAN</th><th style="text-align:center;border:1px solid #d1d5db;padding:6px;background:#f9fafb">PAGI</th><th style="text-align:center;border:1px solid #d1d5db;padding:6px;background:#f9fafb">SIANG</th><th style="text-align:center;border:1px solid #d1d5db;padding:6px;background:#f9fafb">TOTAL</th></tr>';
  
  for(var i=0;i<d.rr.length;i++){
    var r=d.rr[i];
    if(r.u.indexOf("PENCAPAIN")>=0 || r.u == 'kunjungan' || r.u=='' || r.u.indexOf('%')>=0) continue;
    var fw = (r.u.indexOf("TARGET")>=0||r.u.indexOf("GAP")>=0)?"700":"400";

    h += '<tr'+(i%2?' class="n"':'')+'><td class="l" style="border:1px solid #e5e7eb;padding:5px;font-weight:'+fw+'">'+r.u+'</td><td style="border:1px solid #e5e7eb;padding:5px;text-align:center">'+fm(r.p)+'</td><td style="border:1px solid #e5e7eb;padding:5px;text-align:center">'+fm(r.s)+'</td><td style="border:1px solid #e5e7eb;padding:5px;text-align:center;font-weight:bold">'+fm(r.t)+'</td></tr>';
  }
  h += '</table></div>';
  document.getElementById("lph_content").innerHTML = h;
}

function rl(){
  var L = D.L || {};
  var dt = document.getElementById("ls").value;
  var d = L[dt];
  if(!d){document.getElementById("ltw").innerHTML='<p style="padding:40px;text-align:center;color:#999">Tidak ada data</p>';return}
  var h = '<div style="text-align:center;padding:8px;border-bottom:1px solid #eee">';
  h += '<div style="font-size:12px;font-weight:bold">LAPORAN PENJUALAN HARIAN (LPH) - APOTEK BALI BAGAS MEDIKA</div>';
  h += '<div style="font-size:10px;color:#374151;font-weight:600">'+dt+'</div></div>';
  h += '<table style="border-collapse:collapse;width:100%"><tr><th style="text-align:left;border:1px solid #d1d5db;padding:6px;background:#f9fafb">URAIAN</th><th style="text-align:center;border:1px solid #d1d5db;padding:6px;background:#f9fafb">PAGI</th><th style="text-align:center;border:1px solid #d1d5db;padding:6px;background:#f9fafb">SIANG</th><th style="text-align:center;border:1px solid #d1d5db;padding:6px;background:#f9fafb">TOTAL</th></tr>';
  for(var i=0;i<d.rr.length;i++){
    var r=d.rr[i];
    if(r.u.indexOf("PENCAPAIN")>=0 || r.u == 'kunjungan' || r.u=='' || r.u.indexOf('%')>=0) continue;
    var fw = (r.u.indexOf("TARGET")>=0||r.u.indexOf("GAP")>=0)?"700":"400";

    h += '<tr'+(i%2?' class="n"':'')+'><td class="l" style="border:1px solid #e5e7eb;padding:5px;font-weight:'+fw+'">'+r.u+'</td><td style="border:1px solid #e5e7eb;padding:5px;text-align:center">'+fm(r.p)+'</td><td style="border:1px solid #e5e7eb;padding:5px;text-align:center">'+fm(r.s)+'</td><td style="border:1px solid #e5e7eb;padding:5px;text-align:center;font-weight:bold">'+fm(r.t)+'</td></tr>';
  }
  h += '</table>';
  document.getElementById("ltw").innerHTML = h;
}

function rF(){
  var FT = D.F || [];
  var l=0,bl=0,n=0,pv=0;
  for(var i=0;i<FT.length;i++){if(FT[i].nb)l++;else bl++;n+=FT[i].jm;if(!FT[i].nb)pv+=FT[i].jm}
  
  var h = '<div class="f" id="ff">';
  h += '<button class="fb on" onclick="ff(0)">Semua</button>';
  for(var i=0;i<BN.length;i++) h += '<button class="fb" onclick="ff('+(i+1)+')">'+BN[i]+'</button>';
  h += '</div>';
  
  h += '<div class="g" id="fc">';
  h += '<div class="cd"><div class="l">Total</div><div class="v" style="font-size:18px">'+FT.length+'</div></div>';
  h += '<div class="cd"><div class="l">Lunas</div><div class="v" style="font-size:18px;color:#10b981">'+l+'</div></div>';
  h += '<div class="cd"><div class="l">Belum</div><div class="v" style="font-size:18px;color:#ef4444">'+bl+'</div></div>';
  h += '<div class="cd"><div class="l">Nilai</div><div class="v" style="font-size:16px;color:#8b5cf6">'+fm(n)+'</div></div>';
  h += '<div class="cd"><div class="l">Total Dibayar</div><div class="v" style="font-size:16px;color:#10b981">'+fm(n-pv)+'</div></div>';
  h += '<div class="cd"><div class="l">Sisa Bayar</div><div class="v" style="font-size:16px;color:#dc2626">'+fm(pv)+'</div></div>';
  h += '</div>';
  
  h += '<div class="tw"><div class="tl">Faktur 2026 ('+FT.length+' faktur)</div>';
  h += '<div class="s" style="overflow-x:auto;white-space:nowrap"><table><tr><th style="text-align:center">No</th><th style="text-align:left">PBF</th><th style="text-align:right">Nilai</th><th style="text-align:center">Jatuh Tempo</th><th style="text-align:center">Status</th></tr><tbody id="fb">';
  
  var mx = Math.min(FT.length, 300);
  for(var i=0;i<mx;i++){
    var x = FT[i];
    h += '<tr><td style="text-align:center;font-size:10px">'+x.no+'</td><td style="font-size:10px;max-width:100px;overflow:hidden;text-overflow:ellipsis;text-align:left">'+x.pf+'</td><td style="text-align:right;font-size:10px">'+fm(x.jm)+'</td><td style="text-align:center;font-size:10px">'+(x.jt||'-')+'</td><td style="text-align:center"><span class="bg '+(x.nb?"bg1":"bg2")+'">'+(x.nb?"LUNAS":"BELUM")+'</span></td></tr>';
  }
  h += '</tbody></table></div></div>';
  
  document.getElementById("ft_content").innerHTML = h;
  window.FT_DATA = FT;
  window.FI = 0;
}

var FI = 0;
function ff(i){
  FI = i;
  var btns = document.getElementById("ff").querySelectorAll(".fb");
  for(var j=0;j<btns.length;j++) btns[j].className="fb";
  btns[i].className="fb on";
  var f = FI>0 ? FT_DATA.filter(function(x){return x.b==BN[FI-1]}) : FT_DATA;
  var l=0,bl=0,n=0,pv=0;
  for(var i=0;i<f.length;i++){if(f[i].nb)l++;else bl++;n+=f[i].jm;if(!f[i].nb)pv+=f[i].jm}
  
  document.getElementById("fc").innerHTML = 
    '<div class="cd"><div class="l">Total</div><div class="v" style="font-size:18px">'+f.length+'</div></div>'+
    '<div class="cd"><div class="l">Lunas</div><div class="v" style="font-size:18px;color:#10b981">'+l+'</div></div>'+
    '<div class="cd"><div class="l">Belum</div><div class="v" style="font-size:18px;color:#ef4444">'+bl+'</div></div>'+
    '<div class="cd"><div class="l">Nilai</div><div class="v" style="font-size:16px;color:#8b5cf6">'+fm(n)+'</div></div>'+
    '<div class="cd"><div class="l">Piutang</div><div class="v" style="font-size:16px;color:#dc2626">'+fm(pv)+'</div></div>';
  
  var bh="";
  var mx=Math.min(f.length,300);
  for(var i=0;i<mx;i++){
    var x=f[i];
    bh+='<tr><td style="text-align:center;font-size:10px">'+x.no+'</td><td style="font-size:10px;max-width:100px;overflow:hidden;text-overflow:ellipsis;text-align:left">'+x.pf+'</td><td style="text-align:right;font-size:10px">'+fm(x.jm)+'</td><td style="text-align:center;font-size:10px">'+(x.jt||'-')+'</td><td style="text-align:center"><span class="bg '+(x.nb?"bg1":"bg2")+'">'+(x.nb?"LUNAS":"BELUM")+'</span></td></tr>';
  }
  document.getElementById("fb").innerHTML = bh;
}


// Load data from JSON file instead of inline
async function loadData(){
  try {
    var r = await fetch('data.json');
    var raw = await r.json();
    // Map from long key names to short key names used by the code
    window.D = {
      P: raw.penjualan,
      F: raw.faktur,
      L: raw.lph,
      D: raw.lph_dates,
      B: raw.bulan_omzet,
      TO: raw.total_omzet,
      TK: raw.total_kunjungan
    };
  }catch(e){
    document.body.innerHTML = '<div style="padding:20px;text-align:center"><h3>Gagal muat data</h3><p>'+e.message+'</p></div>';
    return;
  }
  rP();
  rL();
  rF();
}
loadData();
</script></body></html>

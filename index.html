    bh+='<tr'+(i%2==0?' class="n"':'')+'><td class="l">'+r.t+'</td><td>'+fm(r.c1)+'</td><td>'+fm(r.c2)+'</td><td>'+fm(r.c3)+'</td><td>'+fm(r.c4)+'</td><td style="border-left:2px solid #d1d5db">'+fm(r.c5)+'</td><td>'+fm(r.c6)+'</td><td>'+fm(r.c7)+'</td><td>'+fm(r.c8)+'</td><td style="font-weight:bold">'+fm(r.tt)+'</td><td>'+r.kj+'</td></tr>';
  }
  document.getElementById("pb").innerHTML = bh;
  document.getElementById("pcnt").innerHTML = f.length;
}

function rL(){
  var L = D.L || {};
  var LD = D.D || [];
  if(!LD.length){document.getElementById("lph_content").innerHTML='<p style="padding:40px;text-align:center;color:#999">Tidak ada data LPH</p>';return}
  
  var last = LD[LD.length-1];
  var h = '<div style="margin-bottom:8px;display:flex;gap:6px;align-items:center;flex-wrap:wrap">';
  h += '<select class="sel" id="ls" onchange="rl()">';
  for(var i=0;i<LD.length;i++) h+='<option value="'+LD[i]+'"'+(LD[i]==last?" selected":"")+'>'+LD[i]+'</option>';
  h += '</select><button class="bp" onclick="window.print()">Cetak</button></div>';
  h += '<div class="tw" id="ltw">';
  
  var d = L[last];
  h += '<div style="text-align:center;padding:8px;border-bottom:1px solid #eee">';
  h += '<div style="font-size:12px;font-weight:bold">LAPORAN PENJUALAN HARIAN (LPH) - APOTEK BALI BAGAS MEDIKA</div>';
  h += '<div style="font-size:10px;color:#374151;font-weight:600">'+last+'</div></div>';
  h += '<table style="border-collapse:collapse;width:100%"><tr><th style="text-align:left;border:1px solid #d1d5db;padding:6px;background:#f9fafb">URAIAN</th><th style="text-align:center;border:1px solid #d1d5db;padding:6px;background:#f9fafb">PAGI</th><th style="text-align:center;border:1px solid #d1d5db;padding:6px;background:#f9fafb">SIANG</th><th style="text-align:center;border:1px solid #d1d5db;padding:6px;background:#f9fafb">TOTAL</th></tr>';
  
  for(var i=0;i<d.rr.length;i++){
    var r=d.rr[i];
    if(r.u.indexOf("PENCAPAIN")>=0 || r.u == 'kunjungan' || r.u=='' || r.u.indexOf('%')>=0) continue;
    var fw = (r.u.indexOf("TARGET")>=0||r.u.indexOf("GAP")>=0)?"700":"400";

    h += '<tr'+(i%2?' class="n"':'')+'><td class="l" style="border:1px solid #e5e7eb;padding:5px;font-weight:'+fw+'">'+r.u+'</td><td style="border:1px solid #e5e7eb;padding:5px;text-align:center">'+fm(r.p)+'</td><td style="border:1px solid #e5e7eb;padding:5px;text-align:center">'+fm(r.s)+'</td><td style="border:1px solid #e5e7eb;padding:5px;text-align:center;font-weight:bold">'+fm(r.t)+'</td></tr>';
  }
  h += '</table></div>';
  document.getElementById("lph_content").innerHTML = h;
}

function rl(){
  var L = D.L || {};

  var d = L[dt];
  if(!d){document.getElementById("ltw").innerHTML='<p style="padding:40px;text-align:center;color:#999">Tidak ada data</p>';return}
  var h = '<div style="text-align:center;padding:8px;border-bottom:1px solid #eee">';
  h += '<div style="font-size:12px;font-weight:bold">LAPORAN PENJUALAN HARIAN (LPH) - APOTEK BALI BAGAS MEDIKA</div>';

  for(var i=0;i<d.rr.length;i++){
    var r=d.rr[i];
    if(r.u.indexOf("PENCAPAIN")>=0 || r.u == 'kunjungan' || r.u=='' || r.u.indexOf('%')>=0) continue;
    var fw = (r.u.indexOf("TARGET")>=0||r.u.indexOf("GAP")>=0)?"700":"400";

    h += '<tr'+(i%2?' class="n"':'')+'><td class="l" style="border:1px solid #e5e7eb;padding:5px;font-weight:'+fw+'">'+r.u+'</td><td style="border:1px solid #e5e7eb;padding:5px;text-align:center">'+fm(r.p)+'</td><td style="border:1px solid #e5e7eb;padding:5px;text-align:center">'+fm(r.s)+'</td><td style="border:1px solid #e5e7eb;padding:5px;text-align:center;font-weight:bold">'+fm(r.t)+'</td></tr>';
  }
  h += '</table>';
  document.getElementById("ltw").innerHTML = h;
}

function rF(){
  var FT = D.F || [];
  var l=0,bl=0,n=0,pv=0;
  for(var i=0;i<FT.length;i++){if(FT[i].nb)l++;else bl++;n+=FT[i].jm;if(!FT[i].nb)pv+=FT[i].jm}
  
  var h = '<div class="f" id="ff">';
  h += '<button class="fb on" onclick="ff(0)">Semua</button>';
  for(var i=0;i<BN.length;i++) h += '<button class="fb" onclick="ff('+(i+1)+')">'+BN[i]+'</button>';
  h += '</div>';
  
  h += '<div class="g" id="fc">';
  h += '<div class="cd"><div class="l">Total</div><div class="v" style="font-size:18px">'+FT.length+'</div></div>';
  h += '<div class="cd"><div class="l">Lunas</div><div class="v" style="font-size:18px;color:#10b981">'+l+'</div></div>';
  h += '<div class="cd"><div class="l">Belum</div><div class="v" style="font-size:18px;color:#ef4444">'+bl+'</div></div>';
  h += '<div class="cd"><div class="l">Nilai</div><div class="v" style="font-size:16px;color:#8b5cf6">'+fm(n)+'</div></div>';
  h += '<div class="cd"><div class="l">Total Dibayar</div><div class="v" style="font-size:16px;color:#10b981">'+fm(n-pv)+'</div></div>';
  h += '<div class="cd"><div class="l">Sisa Bayar</div><div class="v" style="font-size:16px;color:#dc2626">'+fm(pv)+'</div></div>';
  h += '</div>';
  
  h += '<div class="tw"><div class="tl">Faktur 2026 ('+FT.length+' faktur)</div>';
  h += '<div class="s" style="overflow-x:auto;white-space:nowrap"><table><tr><th style="text-align:center">No</th><th style="text-align:left">PBF</th><th style="text-align:right">Nilai</th><th style="text-align:center">Jatuh Tempo</th><th style="text-align:center">Status</th></tr><tbody id="fb">';
  
  var mx = Math.min(FT.length, 300);
  for(var i=0;i<mx;i++){
    var x = FT[i];
    h += '<tr><td style="text-align:center;font-size:10px">'+x.no+'</td><td style="font-size:10px;max-width:100px;overflow:hidden;text-overflow:ellipsis;text-align:left">'+x.pf+'</td><td style="text-align:right;font-size:10px">'+fm(x.jm)+'</td><td style="text-align:center;font-size:10px">'+(x.jt||'-')+'</td><td style="text-align:center"><span class="bg '+(x.nb?"bg1":"bg2")+'">'+(x.nb?"LUNAS":"BELUM")+'</span></td></tr>';
  }
  h += '</tbody></table></div></div>';
  
  document.getElementById("ft_content").innerHTML = h;
  window.FT_DATA = FT;
  window.FI = 0;
}

var FI = 0;
function ff(i){
  FI = i;
  var btns = document.getElementById("ff").querySelectorAll(".fb");
  for(var j=0;j<btns.length;j++) btns[j].className="fb";
  btns[i].className="fb on";
  var f = FI>0 ? FT_DATA.filter(function(x){return x.b==BN[FI-1]}) : FT_DATA;
  var l=0,bl=0,n=0,pv=0;
  for(var i=0;i<f.length;i++){if(f[i].nb)l++;else bl++;n+=f[i].jm;if(!f[i].nb)pv+=f[i].jm}
  
  document.getElementById("fc").innerHTML = 
    '<div class="cd"><div class="l">Total</div><div class="v" style="font-size:18px">'+f.length+'</div></div>'+
    '<div class="cd"><div class="l">Lunas</div><div class="v" style="font-size:18px;color:#10b981">'+l+'</div></div>'+
    '<div class="cd"><div class="l">Belum</div><div class="v" style="font-size:18px;color:#ef4444">'+bl+'</div></div>'+
    '<div class="cd"><div class="l">Nilai</div><div class="v" style="font-size:16px;color:#8b5cf6">'+fm(n)+'</div></div>'+
    '<div class="cd"><div class="l">Piutang</div><div class="v" style="font-size:16px;color:#dc2626">'+fm(pv)+'</div></div>';
  
  var bh="";
  var mx=Math.min(f.length,300);
  for(var i=0;i<mx;i++){
    var x=f[i];
    bh+='<tr><td style="text-align:center;font-size:10px">'+x.no+'</td><td style="font-size:10px;max-width:100px;overflow:hidden;text-overflow:ellipsis;text-align:left">'+x.pf+'</td><td style="text-align:right;font-size:10px">'+fm(x.jm)+'</td><td style="text-align:center;font-size:10px">'+(x.jt||'-')+'</td><td style="text-align:center"><span class="bg '+(x.nb?"bg1":"bg2")+'">'+(x.nb?"LUNAS":"BELUM")+'</span></td></tr>';
  }
  document.getElementById("fb").innerHTML = bh;
}
</script>

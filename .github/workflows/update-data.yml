name: Update Dashboard Data

on:
  schedule:
    - cron: "0 0-14 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Fetch & Generate
        run: python3 update_data.py
      - name: Commit & Push
        run: |
          git config user.name "Auto Update Bot"
          git config user.email "bot@apotek-bali-bagas-medika"
          git add index.html data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "auto update $(date +%d/%m/%Y %H:%M)" && git push)

